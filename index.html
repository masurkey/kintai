<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠ダッシュボード｜empathy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3250;
  --text: #e8eaf0;
  --muted: #7a7f9a;
  --accent: #e8002d;
  --green: #22c55e;
  --blue: #60a5fa;
  --yellow: #facc15;
  --red: #f87171;
  --white-s: #d1d5db;
  --purple: #a78bfa;
  --gray: #6b7280;
  --orange: #fb923c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 17px; font-weight: 700; letter-spacing: 0.05em; }
.logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 10px; }
.date-badge { font-size: 12px; color: var(--muted); background: var(--surface2); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); }
.refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; }
.refresh-btn:hover { border-color: var(--text); color: var(--text); }

/* LOADING */
#loading-screen { display: none; text-align: center; padding: 80px 20px; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* DASHBOARD */
#dashboard { display: none; }

/* 検索バー */
.search-wrap { padding: 16px 24px 0; position: relative; }
.search-icon { position: absolute; left: 38px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; margin-top: 8px; }
#search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 40px 12px 42px; border-radius: 12px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.2s; }
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--muted); }
.search-clear { position: absolute; right: 38px; top: 50%; transform: translateY(-50%); margin-top: 8px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; display: none; line-height: 1; }

/* フィルターバー */
.filter-bar { padding: 8px 24px; background: rgba(232,0,45,0.08); border-bottom: 1px solid rgba(232,0,45,0.2); font-size: 12px; color: var(--accent); display: none; align-items: center; justify-content: space-between; }
.filter-bar.show { display: flex; }
.filter-clear-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; }

/* サマリーグリッド */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 16px 24px 0; }
.summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
.summary-card:hover { background: var(--surface2); }
.summary-card.active { border-color: var(--accent); }
.s-icon { font-size: 18px; }
.s-count { font-size: 22px; font-weight: 700; line-height: 1; }
.s-label { font-size: 10px; color: var(--muted); }

/* スタッフ一覧 */
.list-section { padding: 16px 24px 100px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.result-count { font-size: 12px; color: var(--muted); }
.staff-list { display: flex; flex-direction: column; gap: 6px; }

.staff-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.staff-row:hover { background: var(--surface2); border-color: var(--muted); }
.staff-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.staff-info { flex: 1; min-width: 0; }
.staff-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.staff-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
.emp-code { background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; font-size: 10px; letter-spacing: 0.05em; color: var(--muted); font-family: monospace; }
.staff-status { flex-shrink: 0; }

/* ステータスバッジ */
.status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.s-working  { background: rgba(34,197,94,0.12);  color: var(--green); }
.s-working  .status-dot { background: var(--green);  box-shadow: 0 0 5px var(--green); }
.s-done     { background: rgba(96,165,250,0.12);  color: var(--blue); }
.s-done     .status-dot { background: var(--blue); }
.s-break    { background: rgba(250,204,21,0.12);  color: var(--yellow); }
.s-break    .status-dot { background: var(--yellow); }
.s-absent   { background: rgba(248,113,113,0.12); color: var(--red); }
.s-absent   .status-dot { background: var(--red); }
.s-holiday  { background: rgba(209,213,219,0.08); color: var(--white-s); }
.s-holiday  .status-dot { background: var(--white-s); }
.s-biz-on   { background: rgba(167,139,250,0.12); color: var(--purple); }
.s-biz-on   .status-dot { background: var(--purple); box-shadow: 0 0 5px var(--purple); }
.s-biz-off  { background: rgba(107,114,128,0.12); color: var(--gray); }
.s-biz-off  .status-dot { background: var(--gray); }

.no-results { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }

/* 個人詳細パネル */
#detail-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 480px; background: var(--bg); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform 0.3s cubic-bezier(.4,0,.2,1); z-index: 200; display: flex; flex-direction: column; overflow: hidden; }
#detail-panel.open { transform: translateX(0); }

.detail-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 14px; }
.back-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 4px; transition: color 0.2s; }
.back-btn:hover { color: var(--text); }
.detail-person { flex: 1; }
.detail-name { font-size: 16px; font-weight: 700; }
.detail-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.detail-body { flex: 1; overflow-y: auto; }

/* タブ */
.tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface2); }
.tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; font-family: 'Noto Sans JP', sans-serif; background: none; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* 月ナビ */
.month-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.month-nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
.month-nav-btn:hover { border-color: var(--text); }
.month-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.month-label { font-size: 15px; font-weight: 700; }

/* 月サマリー */
.monthly-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.mscard { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; text-align: center; }
.ms-val { font-size: 20px; font-weight: 700; }
.ms-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* 勤怠カレンダー */
.cal-wrap { padding: 14px 20px 40px; }
.cal-header-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
.cal-dow { text-align: center; font-size: 10px; font-weight: 600; color: var(--muted); padding: 4px 0; }
.cal-dow.sun { color: var(--red); }
.cal-dow.sat { color: var(--blue); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-cell { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; gap: 2px; border: 1px solid transparent; }
.cal-cell.empty { background: transparent; }
.cal-cell.today { border-color: var(--accent) !important; }
.cal-day { font-size: 11px; font-weight: 600; line-height: 1; }
.cal-cell.sun .cal-day { color: var(--red); }
.cal-cell.sat .cal-day { color: var(--blue); }
.cal-icon { font-size: 13px; line-height: 1; }
.cs-working { background: rgba(34,197,94,0.15); }
.cs-done    { background: rgba(96,165,250,0.12); }
.cs-break   { background: rgba(250,204,21,0.12); }
.cs-absent  { background: rgba(248,113,113,0.15); }
.cs-biz-on  { background: rgba(167,139,250,0.15); }
.cs-biz-off { background: rgba(107,114,128,0.10); }
.cs-holiday { background: var(--surface2); }

/* シフトリスト */
.shift-wrap { padding: 14px 20px 40px; }
.shift-month-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.shift-list { display: flex; flex-direction: column; gap: 8px; }
.shift-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; }
.shift-date-block { text-align: center; min-width: 40px; }
.shift-date-day { font-size: 20px; font-weight: 700; line-height: 1; }
.shift-date-dow { font-size: 10px; color: var(--muted); margin-top: 2px; }
.shift-date-dow.sun { color: var(--red); }
.shift-date-dow.sat { color: var(--blue); }
.shift-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }
.shift-info { flex: 1; }
.shift-type { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.shift-time { font-size: 12px; color: var(--muted); }
.shift-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.sb-hayaban  { background: rgba(34,197,94,0.12);  color: var(--green); }
.sb-ossoban  { background: rgba(96,165,250,0.12);  color: var(--blue); }
.sb-part     { background: rgba(251,146,60,0.12);  color: var(--orange); }
.sb-holiday  { background: rgba(209,213,219,0.08); color: var(--white-s); }
.sb-absent   { background: rgba(248,113,113,0.12); color: var(--red); }
.shift-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

/* オーバーレイ */
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 190; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
#overlay.visible { opacity: 1; pointer-events: all; }

/* レスポンシブ */
@media (max-width: 480px) {
  header { padding: 12px 14px; }
  .search-wrap { padding: 12px 14px 0; }
  .search-icon { left: 28px; }
  .search-clear { right: 28px; }
  .summary-grid { padding: 12px 14px 0; gap: 6px; }
  .summary-card { padding: 10px 8px; }
  .s-count { font-size: 18px; }
  .s-label { font-size: 9px; }
  .list-section { padding: 12px 14px 80px; }
  #detail-panel { max-width: 100%; }
}
</style>
</head>
<body>

<header>
  <div class="logo">emp<span>a</span>thy 勤怠</div>
  <div class="header-right">
    <div class="date-badge" id="header-date"></div>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshData()" style="display:none">↻ 更新</button>
  </div>
</header>

<div id="loading-screen">
  <div class="spinner"></div>
  <div id="loading-msg">読み込み中...</div>
</div>

<div id="dashboard">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="氏名または社員番号で検索">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
  </div>
  <div class="filter-bar" id="filter-bar">
    <span id="filter-label"></span>
    <button class="filter-clear-btn" onclick="clearFilter()">✕ 解除</button>
  </div>
  <div class="summary-grid" id="summary-grid"></div>
  <div class="list-section">
    <div class="section-header">
      <div class="section-title">スタッフ一覧</div>
      <div class="result-count" id="result-count"></div>
    </div>
    <div class="staff-list" id="staff-list"></div>
  </div>
</div>

<div id="overlay" onclick="closeDetail()"></div>

<div id="detail-panel">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-person">
      <div class="detail-name" id="dp-name"></div>
      <div class="detail-meta">
        <span class="emp-code" id="dp-code"></span>
        <span id="dp-dept"></span>
        <span id="dp-status-badge"></span>
      </div>
    </div>
  </div>
  <div class="detail-body">
    <!-- タブ -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('kintai')">📋 勤怠</button>
      <button class="tab-btn" onclick="switchTab('shift')">🗓 シフト</button>
    </div>

    <!-- 勤怠タブ -->
    <div class="tab-content active" id="tab-kintai">
      <div class="month-nav">
        <button class="month-nav-btn" id="prev-btn-k" onclick="changeMonth('k', -1)">‹</button>
        <div class="month-label" id="month-label-k"></div>
        <button class="month-nav-btn" id="next-btn-k" onclick="changeMonth('k', 1)">›</button>
      </div>
      <div class="monthly-summary" id="monthly-summary-k"></div>
      <div class="cal-wrap">
        <div class="cal-header-row">
          <div class="cal-dow sun">日</div>
          <div class="cal-dow">月</div>
          <div class="cal-dow">火</div>
          <div class="cal-dow">水</div>
          <div class="cal-dow">木</div>
          <div class="cal-dow">金</div>
          <div class="cal-dow sat">土</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <!-- シフトタブ -->
    <div class="tab-content" id="tab-shift">
      <div class="month-nav">
        <button class="month-nav-btn" id="prev-btn-s" onclick="changeMonth('s', -1)">‹</button>
        <div class="month-label" id="month-label-s"></div>
        <button class="month-nav-btn" id="next-btn-s" onclick="changeMonth('s', 1)">›</button>
      </div>
      <div class="shift-wrap">
        <div class="shift-month-summary" id="shift-month-summary"></div>
        <div class="shift-list" id="shift-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1UDttMPpdxpJIxBnApP8ih9z9gKjH2d8krlWgLbnslVg';
const DAYS_JP = ['日','月','火','水','木','金','土'];

const STATUS_CONFIG = {
  '出勤中':        { emoji:'🟢', cls:'s-working',  calCls:'cs-working',  label:'出勤中' },
  '退勤済':        { emoji:'🔵', cls:'s-done',     calCls:'cs-done',     label:'退勤済' },
  '休憩中':        { emoji:'🟡', cls:'s-break',    calCls:'cs-break',    label:'休憩中' },
  '欠勤':          { emoji:'🔴', cls:'s-absent',   calCls:'cs-absent',   label:'欠勤' },
  '休日':          { emoji:'⚪️', cls:'s-holiday',  calCls:'cs-holiday',  label:'休日' },
  '業務委託稼働中': { emoji:'🟣', cls:'s-biz-on',  calCls:'cs-biz-on',   label:'業委稼働' },
  '業務委託未稼働': { emoji:'⚫️', cls:'s-biz-off', calCls:'cs-biz-off',  label:'業委未稼働' },
};
const STATUS_ORDER = Object.keys(STATUS_CONFIG);

// シフト種別設定
const SHIFT_CONFIG = {
  '早番（9:45〜18:45）':   { label:'早番', time:'9:45〜18:45', cls:'sb-hayaban' },
  '遅番（11:00〜20:00）':  { label:'遅番', time:'11:00〜20:00', cls:'sb-ossoban' },
  'パート①（9:00〜15:00）':{ label:'パート①', time:'9:00〜15:00', cls:'sb-part' },
  'パート②（9:45〜17:00）':{ label:'パート②', time:'9:45〜17:00', cls:'sb-part' },
  'パート③（9:45〜15:00）':{ label:'パート③', time:'9:45〜15:00', cls:'sb-part' },
  '休日':  { label:'休日', time:'—', cls:'sb-holiday' },
  '欠勤':  { label:'欠勤', time:'—', cls:'sb-absent' },
};

// 状態
const now = new Date();
let staffList = [];
let attendanceMap = {};  // {staffId: {'2026-06': {1:'退勤済'}}}
let shiftMap = {};       // {staffId: {'2026-06': {1:'早番（9:45〜18:45）'}}}
let searchQuery = '';
let filterStatus = null;
let currentStaff = null;
let viewYearK = now.getFullYear(), viewMonthK = now.getMonth();
let viewYearS = now.getFullYear(), viewMonthS = now.getMonth();
let currentTab = 'kintai';

// 日付表示
document.getElementById('header-date').textContent =
  `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}（${DAYS_JP[now.getDay()]}）`;

// Sheets読み込み
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\)/);
  if (!match) throw new Error('レスポンス形式エラー');
  const json = JSON.parse(match[1]);
  if (json.status === 'error') throw new Error(json.errors?.[0]?.message || 'エラー');
  return json.table;
}

function tableToRows(table) {
  const cols = table.cols.map(c => c.label);
  return table.rows.map(r => {
    const obj = {};
    cols.forEach((col, i) => { obj[col] = r.c?.[i]?.v ?? r.c?.[i]?.f ?? ''; });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== '' && v !== null));
}

function parseDate(val) {
  if (!val) return null;
  const m1 = String(val).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m1) return new Date(Number(m1[1]), Number(m1[2]), Number(m1[3]));
  const m2 = String(val).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m2) return new Date(Number(m2[1]), Number(m2[2])-1, Number(m2[3]));
  return null;
}

async function loadData() {
  document.getElementById('loading-screen').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('refresh-btn').style.display = 'none';

  try {
    const [staffTable, attTable, shiftTable] = await Promise.all([
      fetchSheet('シート1'),
      fetchSheet('シート2'),
      fetchSheet('フォームの回答1'),
    ]);

    const staffRows = tableToRows(staffTable);
    const attRows   = tableToRows(attTable);
    const shiftRows = tableToRows(shiftTable);

    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

    // スタッフ構築
    staffList = staffRows.map(r => ({
      id: String(r['社員番号'] || '').trim(),
      name: String(r['氏名'] || '').trim(),
      dept: String(r['部署'] || '').trim(),
      status: '—',
    })).filter(s => s.id && s.name);

    // 勤怠マップ
    attendanceMap = {};
    attRows.forEach(r => {
      const d = parseDate(r['日付']);
      const sid = String(r['社員番号'] || '').trim();
      const st = String(r['ステータス'] || '').trim();
      if (!d || !sid || !st) return;
      const yr = d.getFullYear(), mo = d.getMonth()+1, day = d.getDate();
      const mk = `${yr}-${String(mo).padStart(2,'0')}`;
      const ds = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if (!attendanceMap[sid]) attendanceMap[sid] = {};
      if (!attendanceMap[sid][mk]) attendanceMap[sid][mk] = {};
      attendanceMap[sid][mk][day] = st;
      if (ds === todayStr) {
        const s = staffList.find(s => s.id === sid);
        if (s) s.status = st;
      }
    });

    // シフトマップ（フォームの回答1）
    // 列：タイムスタンプ / 社員番号 / 日付 / シフト
    shiftMap = {};
    shiftRows.forEach(r => {
      const cols = Object.keys(r);
      // 列名を柔軟に対応
      const sid = String(r['社員番号'] || r[cols[1]] || '').trim();
      const dateVal = r['日付'] || r[cols[2]];
      const shiftVal = String(r['シフト'] || r[cols[3]] || '').trim();
      const d = parseDate(dateVal);
      if (!d || !sid || !shiftVal) return;
      const yr = d.getFullYear(), mo = d.getMonth()+1, day = d.getDate();
      const mk = `${yr}-${String(mo).padStart(2,'0')}`;
      if (!shiftMap[sid]) shiftMap[sid] = {};
      if (!shiftMap[sid][mk]) shiftMap[sid][mk] = {};
      shiftMap[sid][mk][day] = shiftVal;
    });

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('refresh-btn').style.display = 'block';
    renderSummary();
    renderList();
  } catch(e) {
    document.getElementById('loading-msg').textContent = `⚠️ 読み込みエラー: ${e.message}`;
  }
}

async function refreshData() { await loadData(); }

// 検索
document.getElementById('search-input').addEventListener('input', function() {
  searchQuery = this.value.trim();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  renderList();
});
function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear').style.display = 'none';
  renderList();
}

// フィルター
function toggleFilter(status) {
  filterStatus = filterStatus === status ? null : status;
  const bar = document.getElementById('filter-bar');
  if (filterStatus) {
    bar.classList.add('show');
    document.getElementById('filter-label').textContent = `${STATUS_CONFIG[status].emoji} ${STATUS_CONFIG[status].label} でフィルター中`;
  } else { bar.classList.remove('show'); }
  renderSummary(); renderList();
}
function clearFilter() { toggleFilter(filterStatus); }

// サマリー
function renderSummary() {
  const counts = {};
  STATUS_ORDER.forEach(s => counts[s] = 0);
  staffList.forEach(s => { if (counts[s.status] !== undefined) counts[s.status]++; });
  document.getElementById('summary-grid').innerHTML = STATUS_ORDER.map(s => {
    const cfg = STATUS_CONFIG[s];
    return `<div class="summary-card ${filterStatus===s?'active':''}" onclick="toggleFilter('${s}')">
      <div class="s-icon">${cfg.emoji}</div>
      <div class="s-count">${counts[s]}</div>
      <div class="s-label">${cfg.label}</div>
    </div>`;
  }).join('');
}

// スタッフ一覧
function renderList() {
  let list = [...staffList];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(s => s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q) || s.dept.toLowerCase().includes(q));
  }
  if (filterStatus) list = list.filter(s => s.status === filterStatus);
  list.sort((a,b) => STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status));
  document.getElementById('result-count').textContent = `${list.length}名`;
  if (!list.length) { document.getElementById('staff-list').innerHTML = `<div class="no-results">該当するスタッフが見つかりません</div>`; return; }
  document.getElementById('staff-list').innerHTML = list.map(s => {
    const cfg = STATUS_CONFIG[s.status] || { emoji:'—', cls:'', label: s.status };
    return `<div class="staff-row" onclick="openDetail('${s.id}')">
      <div class="staff-avatar">${s.name[0]}</div>
      <div class="staff-info">
        <div class="staff-name">${s.name}</div>
        <div class="staff-meta"><span class="emp-code">${s.id}</span><span>${s.dept}</span></div>
      </div>
      <div class="staff-status"><span class="status-badge ${cfg.cls}"><span class="status-dot"></span>${cfg.emoji} ${cfg.label}</span></div>
    </div>`;
  }).join('');
}

// タブ切り替え
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='kintai')||(i===1&&tab==='shift')));
  document.getElementById('tab-kintai').classList.toggle('active', tab==='kintai');
  document.getElementById('tab-shift').classList.toggle('active', tab==='shift');
  if (tab==='kintai') renderKintai();
  else renderShift();
}

// 月変更
function changeMonth(type, delta) {
  if (type==='k') {
    viewMonthK += delta;
    if (viewMonthK < 0) { viewMonthK=11; viewYearK--; }
    if (viewMonthK > 11) { viewMonthK=0; viewYearK++; }
    renderKintai();
  } else {
    viewMonthS += delta;
    if (viewMonthS < 0) { viewMonthS=11; viewYearS--; }
    if (viewMonthS > 11) { viewMonthS=0; viewYearS++; }
    renderShift();
  }
}

// 個人詳細を開く
function openDetail(staffId) {
  currentStaff = staffList.find(s => s.id === staffId);
  if (!currentStaff) return;
  viewYearK = viewYearS = now.getFullYear();
  viewMonthK = viewMonthS = now.getMonth();
  currentTab = 'kintai';
  switchTab('kintai');
  document.getElementById('dp-name').textContent = currentStaff.name;
  document.getElementById('dp-code').textContent = currentStaff.id;
  document.getElementById('dp-dept').textContent = currentStaff.dept;
  const cfg = STATUS_CONFIG[currentStaff.status] || { emoji:'—', cls:'', label: currentStaff.status };
  document.getElementById('dp-status-badge').innerHTML = `<span class="status-badge ${cfg.cls}"><span class="status-dot"></span>${cfg.emoji} ${cfg.label}</span>`;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  currentStaff = null;
}

// 勤怠カレンダー描画
function renderKintai() {
  if (!currentStaff) return;
  const mk = `${viewYearK}-${String(viewMonthK+1).padStart(2,'0')}`;
  document.getElementById('month-label-k').textContent = `${viewYearK}年${viewMonthK+1}月`;
  const minD = new Date(now.getFullYear(), now.getMonth()-5, 1);
  const maxD = new Date(now.getFullYear(), now.getMonth(), 1);
  const curD = new Date(viewYearK, viewMonthK, 1);
  document.getElementById('prev-btn-k').disabled = curD <= minD;
  document.getElementById('next-btn-k').disabled = curD >= maxD;

  const dayMap = attendanceMap[currentStaff.id]?.[mk] || {};
  let working=0, absent=0, holiday=0, bizOn=0;
  Object.values(dayMap).forEach(st => {
    if (['出勤中','退勤済','休憩中'].includes(st)) working++;
    else if (st==='欠勤') absent++;
    else if (st==='休日') holiday++;
    else if (st==='業務委託稼働中') bizOn++;
  });
  document.getElementById('monthly-summary-k').innerHTML = `
    <div class="mscard"><div class="ms-val" style="color:var(--green)">${working}</div><div class="ms-lbl">出勤日</div></div>
    <div class="mscard"><div class="ms-val" style="color:var(--red)">${absent}</div><div class="ms-lbl">欠勤日</div></div>
    <div class="mscard"><div class="ms-val" style="color:var(--white-s)">${holiday}</div><div class="ms-lbl">休日</div></div>
    <div class="mscard"><div class="ms-val" style="color:var(--purple)">${bizOn}</div><div class="ms-lbl">業委稼働</div></div>`;

  const firstDow = new Date(viewYearK, viewMonthK, 1).getDay();
  const daysInMonth = new Date(viewYearK, viewMonthK+1, 0).getDate();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  let cells = '';
  for (let i=0; i<firstDow; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let day=1; day<=daysInMonth; day++) {
    const dow = new Date(viewYearK, viewMonthK, day).getDay();
    const st = dayMap[day];
    const cfg2 = st ? STATUS_CONFIG[st] : null;
    const isToday = `${viewYearK}-${String(viewMonthK+1).padStart(2,'0')}-${String(day).padStart(2,'0')}` === todayStr;
    const dowCls = dow===0?'sun':dow===6?'sat':'';
    cells += `<div class="cal-cell ${cfg2?cfg2.calCls:''} ${dowCls} ${isToday?'today':''}">
      <span class="cal-day">${day}</span>
      ${cfg2?`<span class="cal-icon">${cfg2.emoji}</span>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = cells;
}

// シフトリスト描画
function renderShift() {
  if (!currentStaff) return;
  const mk = `${viewYearS}-${String(viewMonthS+1).padStart(2,'0')}`;
  document.getElementById('month-label-s').textContent = `${viewYearS}年${viewMonthS+1}月`;
  const minD = new Date(now.getFullYear(), now.getMonth()-5, 1);
  const maxD = new Date(now.getFullYear(), now.getMonth(), 1);
  const curD = new Date(viewYearS, viewMonthS, 1);
  document.getElementById('prev-btn-s').disabled = curD <= minD;
  document.getElementById('next-btn-s').disabled = curD >= maxD;

  const dayMap = shiftMap[currentStaff.id]?.[mk] || {};
  const daysInMonth = new Date(viewYearS, viewMonthS+1, 0).getDate();

  // 月サマリー
  let hayaban=0, ossoban=0, part=0, kyujitu=0;
  Object.values(dayMap).forEach(sv => {
    if (sv.includes('早番')) hayaban++;
    else if (sv.includes('遅番')) ossoban++;
    else if (sv.includes('パート')) part++;
    else if (sv.includes('休日')) kyujitu++;
  });
  document.getElementById('shift-month-summary').innerHTML = `
    <div class="mscard"><div class="ms-val" style="color:var(--green)">${hayaban}</div><div class="ms-lbl">早番</div></div>
    <div class="mscard"><div class="ms-val" style="color:var(--blue)">${ossoban}</div><div class="ms-lbl">遅番</div></div>
    <div class="mscard"><div class="ms-val" style="color:var(--orange)">${part}</div><div class="ms-lbl">パート</div></div>`;

  // シフト一覧（日付順）
  const entries = [];
  for (let day=1; day<=daysInMonth; day++) {
    if (dayMap[day]) entries.push({ day, shift: dayMap[day] });
  }

  if (!entries.length) {
    document.getElementById('shift-list').innerHTML = `<div class="shift-empty">この月のシフトデータがありません</div>`;
    return;
  }

  document.getElementById('shift-list').innerHTML = entries.map(({ day, shift }) => {
    const dow = new Date(viewYearS, viewMonthS, day).getDay();
    const cfg = SHIFT_CONFIG[shift] || { label: shift, time: '—', cls: 'sb-holiday' };
    const dowCls = dow===0?'sun':dow===6?'sat':'';
    return `<div class="shift-item">
      <div class="shift-date-block">
        <div class="shift-date-day">${day}</div>
        <div class="shift-date-dow ${dowCls}">${DAYS_JP[dow]}</div>
      </div>
      <div class="shift-divider"></div>
      <div class="shift-info">
        <div class="shift-type">${cfg.label}</div>
        <div class="shift-time">${cfg.time}</div>
      </div>
      <span class="shift-badge ${cfg.cls}">${cfg.label}</span>
    </div>`;
  }).join('');
}

// 起動
loadData();
</script>
