<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠ダッシュボード｜empathy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3250;
  --text: #e8eaf0;
  --muted: #7a7f9a;
  --accent: #e8002d;
  --green: #22c55e;
  --blue: #60a5fa;
  --yellow: #facc15;
  --red: #f87171;
  --white-s: #d1d5db;
  --purple: #a78bfa;
  --gray: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ========== HEADER ========== */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 17px; font-weight: 700; letter-spacing: 0.05em; }
.logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 10px; }
.date-badge {
  font-size: 12px; color: var(--muted);
  background: var(--surface2); padding: 5px 12px;
  border-radius: 20px; border: 1px solid var(--border);
}
.refresh-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); padding: 5px 12px; border-radius: 20px;
  cursor: pointer; font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--text); color: var(--text); }

/* ========== SETUP ========== */
#setup-panel {
  max-width: 520px; margin: 60px auto;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 36px;
}
#setup-panel h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
#setup-panel p { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.8; }
.field-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
input[type="text"] {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 12px 16px; border-radius: 10px;
  font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  outline: none; transition: border-color 0.2s; margin-bottom: 20px;
}
input[type="text"]:focus { border-color: var(--accent); }
input[type="text"]::placeholder { color: var(--muted); }
.btn-primary {
  width: 100%; padding: 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.85; }
.help-box {
  margin-top: 20px; padding: 14px 16px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; color: var(--muted); line-height: 1.8;
}
.help-box code {
  background: var(--border); padding: 1px 6px; border-radius: 4px;
  font-size: 11px; color: var(--text);
}

/* ========== LOADING / ERROR ========== */
#loading-screen {
  display: none; text-align: center; padding: 80px 20px; color: var(--muted);
}
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  margin: 24px; padding: 16px 20px;
  background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3);
  border-radius: 10px; font-size: 13px; color: var(--red); line-height: 1.7;
}
.error-box button {
  margin-top: 12px; background: none; border: 1px solid var(--red);
  color: var(--red); padding: 6px 14px; border-radius: 6px;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
}

/* ========== DASHBOARD ========== */
#dashboard { display: none; }

/* 検索バー */
.search-wrap { padding: 16px 24px 0; position: relative; }
.search-icon {
  position: absolute; left: 38px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 15px; pointer-events: none; margin-top: 8px;
}
#search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 12px 40px 12px 42px;
  border-radius: 12px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  outline: none; transition: border-color 0.2s; margin-bottom: 0;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--muted); }
.search-clear {
  position: absolute; right: 38px; top: 50%; transform: translateY(-50%);
  margin-top: 8px; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 18px; padding: 4px; display: none; line-height: 1;
}

/* フィルターバー */
.filter-bar {
  padding: 8px 24px; background: rgba(232,0,45,0.08);
  border-bottom: 1px solid rgba(232,0,45,0.2);
  font-size: 12px; color: var(--accent);
  display: none; align-items: center; justify-content: space-between;
}
.filter-bar.show { display: flex; }
.filter-clear-btn {
  background: none; border: none; color: var(--accent);
  cursor: pointer; font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
}

/* サマリーグリッド */
.summary-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; padding: 16px 24px 0;
}
.summary-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 12px;
  display: flex; flex-direction: column; gap: 4px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
}
.summary-card:hover { background: var(--surface2); }
.summary-card.active { border-color: var(--accent); }
.s-icon { font-size: 18px; }
.s-count { font-size: 22px; font-weight: 700; line-height: 1; }
.s-label { font-size: 10px; color: var(--muted); }

/* スタッフ一覧 */
.list-section { padding: 16px 24px 100px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.result-count { font-size: 12px; color: var(--muted); }
.staff-list { display: flex; flex-direction: column; gap: 6px; }

.staff-row {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
}
.staff-row:hover { background: var(--surface2); border-color: var(--muted); }

.staff-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--muted); flex-shrink: 0;
}
.staff-info { flex: 1; min-width: 0; }
.staff-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.staff-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
.emp-code {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 2px 7px; border-radius: 4px; font-size: 10px;
  letter-spacing: 0.05em; color: var(--muted); font-family: monospace;
}
.staff-status { flex-shrink: 0; }

/* ステータスバッジ */
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.s-working  { background: rgba(34,197,94,0.12);  color: var(--green); }
.s-working  .status-dot { background: var(--green);  box-shadow: 0 0 5px var(--green); }
.s-done     { background: rgba(96,165,250,0.12);  color: var(--blue); }
.s-done     .status-dot { background: var(--blue); }
.s-break    { background: rgba(250,204,21,0.12);  color: var(--yellow); }
.s-break    .status-dot { background: var(--yellow); }
.s-absent   { background: rgba(248,113,113,0.12); color: var(--red); }
.s-absent   .status-dot { background: var(--red); }
.s-holiday  { background: rgba(209,213,219,0.08); color: var(--white-s); }
.s-holiday  .status-dot { background: var(--white-s); }
.s-biz-on   { background: rgba(167,139,250,0.12); color: var(--purple); }
.s-biz-on   .status-dot { background: var(--purple); box-shadow: 0 0 5px var(--purple); }
.s-biz-off  { background: rgba(107,114,128,0.12); color: var(--gray); }
.s-biz-off  .status-dot { background: var(--gray); }

.no-results { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }

/* ========== 個人詳細パネル ========== */
#detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 100%; max-width: 480px;
  background: var(--bg); border-left: 1px solid var(--border);
  transform: translateX(100%); transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  z-index: 200; display: flex; flex-direction: column; overflow: hidden;
}
#detail-panel.open { transform: translateX(0); }

.detail-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); display: flex; align-items: center; gap: 14px;
}
.back-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 20px; padding: 4px; transition: color 0.2s;
}
.back-btn:hover { color: var(--text); }
.detail-person { flex: 1; }
.detail-name { font-size: 16px; font-weight: 700; }
.detail-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.detail-body { flex: 1; overflow-y: auto; }

/* 月ナビ */
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface2);
}
.month-nav-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s;
}
.month-nav-btn:hover { border-color: var(--text); }
.month-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.month-label { font-size: 15px; font-weight: 700; }

/* 月サマリー */
.monthly-summary {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.mscard { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; text-align: center; }
.ms-val { font-size: 20px; font-weight: 700; }
.ms-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* カレンダー */
.cal-wrap { padding: 14px 20px 40px; }
.cal-loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
.cal-header-row {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px; margin-bottom: 6px;
}
.cal-dow { text-align: center; font-size: 10px; font-weight: 600; color: var(--muted); padding: 4px 0; }
.cal-dow.sun { color: var(--red); }
.cal-dow.sat { color: var(--blue); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-cell {
  aspect-ratio: 1; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 12px; gap: 2px; border: 1px solid transparent;
}
.cal-cell.empty { background: transparent; }
.cal-cell.today { border-color: var(--accent) !important; }
.cal-day { font-size: 11px; font-weight: 600; line-height: 1; }
.cal-cell.sun .cal-day { color: var(--red); }
.cal-cell.sat .cal-day { color: var(--blue); }
.cal-icon { font-size: 13px; line-height: 1; }
.cs-working { background: rgba(34,197,94,0.15); }
.cs-done    { background: rgba(96,165,250,0.12); }
.cs-break   { background: rgba(250,204,21,0.12); }
.cs-absent  { background: rgba(248,113,113,0.15); }
.cs-biz-on  { background: rgba(167,139,250,0.15); }
.cs-biz-off { background: rgba(107,114,128,0.10); }
.cs-holiday { background: var(--surface2); }

/* オーバーレイ */
#overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 190; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
#overlay.visible { opacity: 1; pointer-events: all; }

/* レスポンシブ */
@media (max-width: 480px) {
  header { padding: 12px 14px; }
  .search-wrap { padding: 12px 14px 0; }
  .search-icon { left: 28px; }
  .search-clear { right: 28px; }
  .summary-grid { padding: 12px 14px 0; gap: 6px; }
  .summary-card { padding: 10px 8px; }
  .s-count { font-size: 18px; }
  .s-label { font-size: 9px; }
  .list-section { padding: 12px 14px 80px; }
  #detail-panel { max-width: 100%; }
}
</style>
</head>
<body>

<header>
  <div class="logo">emp<span>a</span>thy 勤怠</div>
  <div class="header-right">
    <div class="date-badge" id="header-date"></div>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshData()" style="display:none">↻ 更新</button>
  </div>
</header>

<!-- セットアップ -->
<div id="setup-panel">
  <h2>スプレッドシートを接続</h2>
  <p>GoogleスプレッドシートのURLまたはIDを入力してください。<br>シートは「リンクを知っている全員が閲覧可」に設定してください。</p>
  <div class="field-label">スプレッドシートID または URL</div>
  <input type="text" id="sheet-id-input" placeholder="例: 1UDttMPpdxpJIxBnApP8ih9z9gKjH2d8krlWgLbnslVg">
  <button class="btn-primary" onclick="connectSheet()">接続して表示</button>
  <div class="help-box">
    📋 <strong>シート構成：</strong><br>
    <strong>シート1</strong>（スタッフ）：<code>社員番号</code> <code>氏名</code> <code>部署</code><br>
    <strong>シート2</strong>（勤怠）：<code>日付</code> <code>社員番号</code> <code>ステータス</code><br><br>
    ステータス例：<code>出勤中</code> <code>退勤済</code> <code>休憩中</code> <code>欠勤</code> <code>休日</code> <code>業務委託稼働中</code> <code>業務委託未稼働</code>
  </div>
</div>

<!-- ローディング -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div id="loading-msg">スプレッドシートを読み込み中...</div>
</div>

<!-- ダッシュボード -->
<div id="dashboard">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="氏名または社員番号で検索（例: 田尾 / EMP001）">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <span id="filter-label"></span>
    <button class="filter-clear-btn" onclick="clearFilter()">✕ 解除</button>
  </div>

  <div class="summary-grid" id="summary-grid"></div>

  <div class="list-section">
    <div class="section-header">
      <div class="section-title">スタッフ一覧</div>
      <div class="result-count" id="result-count"></div>
    </div>
    <div class="staff-list" id="staff-list"></div>
  </div>
</div>

<!-- オーバーレイ -->
<div id="overlay" onclick="closeDetail()"></div>

<!-- 個人詳細 -->
<div id="detail-panel">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-person">
      <div class="detail-name" id="dp-name"></div>
      <div class="detail-meta">
        <span class="emp-code" id="dp-code"></span>
        <span id="dp-dept"></span>
        <span id="dp-status-badge"></span>
      </div>
    </div>
  </div>
  <div class="detail-body">
    <div class="month-nav">
      <button class="month-nav-btn" id="prev-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label"></div>
      <button class="month-nav-btn" id="next-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="monthly-summary" id="monthly-summary"></div>
    <div class="cal-wrap">
      <div class="cal-header-row">
        <div class="cal-dow sun">日</div>
        <div class="cal-dow">月</div>
        <div class="cal-dow">火</div>
        <div class="cal-dow">水</div>
        <div class="cal-dow">木</div>
        <div class="cal-dow">金</div>
        <div class="cal-dow sat">土</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>
</div>

<script>
// ===== 定数 =====
const SHEET_ID = '1UDttMPpdxpJIxBnApP8ih9z9gKjH2d8krlWgLbnslVg'; // デフォルト
const SHEET1 = 'シート1';
const SHEET2 = 'シート2';

const STATUS_CONFIG = {
  '出勤中':        { emoji:'🟢', cls:'s-working',  calCls:'cs-working',  label:'出勤中' },
  '退勤済':        { emoji:'🔵', cls:'s-done',     calCls:'cs-done',     label:'退勤済' },
  '休憩中':        { emoji:'🟡', cls:'s-break',    calCls:'cs-break',    label:'休憩中' },
  '欠勤':          { emoji:'🔴', cls:'s-absent',   calCls:'cs-absent',   label:'欠勤' },
  '休日':          { emoji:'⚪️', cls:'s-holiday',  calCls:'cs-holiday',  label:'休日' },
  '業務委託稼働中': { emoji:'🟣', cls:'s-biz-on',  calCls:'cs-biz-on',   label:'業委稼働' },
  '業務委託未稼働': { emoji:'⚫️', cls:'s-biz-off', calCls:'cs-biz-off',  label:'業委未稼働' },
};
const STATUS_ORDER = Object.keys(STATUS_CONFIG);
const DAYS_JP = ['日','月','火','水','木','金','土'];

// ===== 状態 =====
const now = new Date();
let sheetId = '';
let staffList = [];      // [{id, name, dept, status}]
let attendanceMap = {};  // {staffId: {'2026-06': {1:'退勤済', 2:'出勤中', ...}}}
let searchQuery = '';
let filterStatus = null;
let currentStaff = null;
let viewYear = now.getFullYear();
let viewMonth = now.getMonth();

// ===== 日付表示 =====
document.getElementById('header-date').textContent =
  `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}（${DAYS_JP[now.getDay()]}）`;

// ===== Sheets読み込み =====
function extractId(input) {
  const m = input.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : input.trim();
}

async function fetchSheet(id, sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\)/);
  if (!match) throw new Error('レスポンス形式が不正です');
  const json = JSON.parse(match[1]);
  if (json.status === 'error') throw new Error(json.errors?.[0]?.message || '読み込みエラー');
  return json.table;
}

function tableToRows(table) {
  const cols = table.cols.map(c => c.label);
  return table.rows.map(r => {
    const obj = {};
    cols.forEach((col, i) => { obj[col] = r.c?.[i]?.v ?? r.c?.[i]?.f ?? ''; });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== '' && v !== null));
}

// 日付パース：Sheets の gviz は Date(2026,5,12) 形式の文字列を返すことがある
function parseDate(val) {
  if (!val) return null;
  // gviz Date(...) 形式
  const m1 = String(val).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m1) return new Date(Number(m1[1]), Number(m1[2]), Number(m1[3]));
  // 文字列形式 2026/06/12 or 2026-06-12
  const m2 = String(val).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m2) return new Date(Number(m2[1]), Number(m2[2])-1, Number(m2[3]));
  return null;
}

async function connectSheet() {
  const raw = document.getElementById('sheet-id-input').value.trim();
  if (!raw) { alert('URLまたはIDを入力してください'); return; }
  sheetId = extractId(raw);
  await loadData();
}

async function refreshData() { await loadData(); }

async function loadData() {
  showLoading('スプレッドシートを読み込み中...');
  try {
    // シート1（スタッフ）
    showLoading('スタッフ情報を読み込み中...');
    const staffTable = await fetchSheet(sheetId, SHEET1);
    const staffRows = tableToRows(staffTable);

    // シート2（勤怠）
    showLoading('勤怠データを読み込み中...');
    const attTable = await fetchSheet(sheetId, SHEET2);
    const attRows = tableToRows(attTable);

    // スタッフ構築
    staffList = staffRows.map(r => ({
      id:     String(r['社員番号'] || '').trim(),
      name:   String(r['氏名'] || '').trim(),
      dept:   String(r['部署'] || '').trim(),
      status: '—',
    })).filter(s => s.id && s.name);

    // 勤怠マップ構築
    attendanceMap = {};
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

    attRows.forEach(r => {
      const d = parseDate(r['日付']);
      const sid = String(r['社員番号'] || '').trim();
      const st = String(r['ステータス'] || '').trim();
      if (!d || !sid || !st) return;

      const yr = d.getFullYear();
      const mo = d.getMonth() + 1;
      const day = d.getDate();
      const monthKey = `${yr}-${String(mo).padStart(2,'0')}`;
      const dayStr = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

      if (!attendanceMap[sid]) attendanceMap[sid] = {};
      if (!attendanceMap[sid][monthKey]) attendanceMap[sid][monthKey] = {};
      attendanceMap[sid][monthKey][day] = st;

      // 今日のステータスをスタッフに反映
      if (dayStr === todayStr) {
        const staff = staffList.find(s => s.id === sid);
        if (staff) staff.status = st;
      }
    });

    showDashboard();
  } catch(e) {
    showError(e.message);
  }
}

// ===== 画面切替 =====
function showLoading(msg) {
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'block';
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('refresh-btn').style.display = 'none';
}

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('setup-panel').style.display = 'block';
  const existing = document.querySelector('.error-box');
  if (existing) existing.remove();
  const box = document.createElement('div');
  box.className = 'error-box';
  box.innerHTML = `⚠️ 読み込みに失敗しました。<br>${msg}<br><br>
    ・シートが「リンクを知っている全員が閲覧可」になっているか確認してください<br>
    ・シート名が「シート1」「シート2」になっているか確認してください`;
  document.getElementById('setup-panel').appendChild(box);
}

function showDashboard() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('refresh-btn').style.display = 'block';
  renderSummary();
  renderList();
}

// ===== 検索 =====
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  renderList();
});
function clearSearch() {
  searchInput.value = ''; searchQuery = '';
  document.getElementById('search-clear').style.display = 'none';
  renderList();
}

// ===== フィルター =====
function toggleFilter(status) {
  filterStatus = filterStatus === status ? null : status;
  const bar = document.getElementById('filter-bar');
  if (filterStatus) {
    bar.classList.add('show');
    document.getElementById('filter-label').textContent =
      `${STATUS_CONFIG[status].emoji} ${STATUS_CONFIG[status].label} でフィルター中`;
  } else {
    bar.classList.remove('show');
  }
  renderSummary();
  renderList();
}
function clearFilter() { toggleFilter(filterStatus); }

// ===== サマリー =====
function renderSummary() {
  const counts = {};
  STATUS_ORDER.forEach(s => counts[s] = 0);
  staffList.forEach(s => { if (counts[s.status] !== undefined) counts[s.status]++; });

  document.getElementById('summary-grid').innerHTML = STATUS_ORDER.map(s => {
    const cfg = STATUS_CONFIG[s];
    return `<div class="summary-card ${filterStatus === s ? 'active' : ''}" onclick="toggleFilter('${s}')">
      <div class="s-icon">${cfg.emoji}</div>
      <div class="s-count">${counts[s]}</div>
      <div class="s-label">${cfg.label}</div>
    </div>`;
  }).join('');
}

// ===== スタッフ一覧 =====
function renderList() {
  let list = [...staffList];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.id.toLowerCase().includes(q) ||
      s.dept.toLowerCase().includes(q)
    );
  }
  if (filterStatus) {
    list = list.filter(s => s.status === filterStatus);
  }
  list.sort((a, b) => STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status));

  document.getElementById('result-count').textContent = `${list.length}名`;

  if (list.length === 0) {
    document.getElementById('staff-list').innerHTML = `<div class="no-results">該当するスタッフが見つかりません</div>`;
    return;
  }

  document.getElementById('staff-list').innerHTML = list.map(s => {
    const cfg = STATUS_CONFIG[s.status] || { emoji:'—', cls:'', label: s.status };
    return `<div class="staff-row" onclick="openDetail('${s.id}')">
      <div class="staff-avatar">${s.name[0]}</div>
      <div class="staff-info">
        <div class="staff-name">${s.name}</div>
        <div class="staff-meta">
          <span class="emp-code">${s.id}</span>
          <span>${s.dept}</span>
        </div>
      </div>
      <div class="staff-status">
        <span class="status-badge ${cfg.cls}">
          <span class="status-dot"></span>${cfg.emoji} ${cfg.label}
        </span>
      </div>
    </div>`;
  }).join('');
}

// ===== 個人詳細 =====
function openDetail(staffId) {
  currentStaff = staffList.find(s => s.id === staffId);
  if (!currentStaff) return;
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  renderDetail();
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  currentStaff = null;
}

function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderDetail();
}

function renderDetail() {
  if (!currentStaff) return;
  const s = currentStaff;
  const cfg = STATUS_CONFIG[s.status] || { emoji:'—', cls:'', label: s.status };

  document.getElementById('dp-name').textContent = s.name;
  document.getElementById('dp-code').textContent = s.id;
  document.getElementById('dp-dept').textContent = s.dept;
  document.getElementById('dp-status-badge').innerHTML =
    `<span class="status-badge ${cfg.cls}"><span class="status-dot"></span>${cfg.emoji} ${cfg.label}</span>`;

  const monthKey = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
  document.getElementById('month-label').textContent = `${viewYear}年${viewMonth+1}月`;

  // ナビボタン：過去6ヶ月まで
  const minDate = new Date(now.getFullYear(), now.getMonth() - 5, 1);
  const maxDate = new Date(now.getFullYear(), now.getMonth(), 1);
  const curDate = new Date(viewYear, viewMonth, 1);
  document.getElementById('prev-btn').disabled = curDate <= minDate;
  document.getElementById('next-btn').disabled = curDate >= maxDate;

  // 月別勤怠データ
  const dayMap = attendanceMap[s.id]?.[monthKey] || {};

  // 月サマリー集計
  let working = 0, absent = 0, holiday = 0, bizOn = 0;
  Object.values(dayMap).forEach(st => {
    if (['出勤中','退勤済','休憩中'].includes(st)) working++;
    else if (st === '欠勤') absent++;
    else if (st === '休日') holiday++;
    else if (st === '業務委託稼働中') bizOn++;
  });

  document.getElementById('monthly-summary').innerHTML = `
    <div class="mscard"><div class="ms-val" style="color:var(--green)">${working}</div><div class="ms-lbl">出勤日</div></div>
    <div class="mscard"><div class="ms-val" style="color:var(--red)">${absent}</div><div class="ms-lbl">欠勤日</div></div>
    <div class="mscard"><div class="ms-val" style="color:var(--white-s)">${holiday}</div><div class="ms-lbl">休日</div></div>
    <div class="mscard"><div class="ms-val" style="color:var(--purple)">${bizOn}</div><div class="ms-lbl">業委稼働</div></div>
  `;

  // カレンダー描画
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  let cells = '';
  for (let i = 0; i < firstDow; i++) cells += `<div class="cal-cell empty"></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const dow = new Date(viewYear, viewMonth, day).getDay();
    const st = dayMap[day];
    const cfg2 = st ? STATUS_CONFIG[st] : null;
    const isToday = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}` === todayStr;
    const dowCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    cells += `<div class="cal-cell ${cfg2 ? cfg2.calCls : ''} ${dowCls} ${isToday ? 'today' : ''}">
      <span class="cal-day">${day}</span>
      ${cfg2 ? `<span class="cal-icon">${cfg2.emoji}</span>` : ''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = cells;
}

// ===== 初期表示 =====
// URLにシートIDが含まれていれば自動接続
const urlParams = new URLSearchParams(window.location.search);
const paramId = urlParams.get('id');
if (paramId) {
  sheetId = paramId;
  document.getElementById('sheet-id-input').value = paramId;
  loadData();
} else {
  // デフォルトIDがあれば自動接続
  const defaultId = '1UDttMPpdxpJIxBnApP8ih9z9gKjH2d8krlWgLbnslVg';
  if (defaultId) {
    sheetId = defaultId;
    document.getElementById('sheet-id-input').value = defaultId;
    loadData();
  }
}
</script>
